<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>N-IA JARVIS</title>

<style>
body{
  margin:0;
  background:#01040a;
  color:#00f0ff;
  font-family:monospace;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* AVATAR */
#avatarBox{
  position:relative;
  width:150px;
  margin-top:20px;
}

#avatar{
  width:100%;
  border-radius:50%;
  box-shadow:0 0 20px #00f0ff;
}

.ojo{
  width:12px;
  height:12px;
  background:black;
  border-radius:50%;
  position:absolute;
}

#ojo1{ top:45px; left:45px; }
#ojo2{ top:45px; right:45px; }

/* CHAT */
#chat{
  width:90%;
  max-width:700px;
  height:400px;
  border:1px solid #00f0ff;
  overflow:auto;
  padding:10px;
  margin-top:20px;
}

.msg{margin:6px;padding:8px;border-radius:8px;}
.user{background:#022;color:#0ff;text-align:right;}
.ai{background:#fff;color:#000;}

#inputArea{
  display:flex;
  width:90%;
  max-width:700px;
  margin-top:10px;
}

input{
  flex:1;
  padding:10px;
  border:none;
  outline:none;
}

button{
  padding:10px;
  background:#00f0ff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>🤖 N-IA JARVIS</h2>

<!-- AVATAR -->
<div id="avatarBox">
  <img src="avatar.png" id="avatar">
  <div class="ojo" id="ojo1"></div>
  <div class="ojo" id="ojo2"></div>
</div>

<!-- CHAT -->
<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Habla con tu IA..." onkeypress="if(event.key==='Enter') enviar()">
  <button onclick="enviar()">Enviar</button>
</div>

<script>

// HISTORIAL IA
let historial = [
  {
    role:"system",
    content:"Eres N-IA estilo JARVIS, inteligente, natural y útil."
  }
];

// AGREGAR MENSAJE
function agregar(texto,tipo){
  let chat=document.getElementById("chat");
  let div=document.createElement("div");
  div.className="msg "+tipo;
  div.innerText=(tipo==="user"?"Tú: ":"IA: ")+texto;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
  return div;
}

// ENVIAR MENSAJE
async function enviar(){

  let input=document.getElementById("input");
  let txt=input.value.trim();
  if(!txt) return;

  agregar(txt,"user");
  input.value="";

  historial.push({role:"user",content:txt});

  let thinking = agregar("Pensando...","ai");

  try{
    let res = await fetch("/ia",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        messages: historial
      })
    });

    let data = await res.json();

    let respuesta = data.choices[0].message.content;

    historial.push({role:"assistant",content:respuesta});

    thinking.innerText="IA: "+respuesta;

  }catch(e){
    thinking.innerText="IA: Error de conexión";
  }
}

// OJOS SIGUEN EL CURSOR 👀
document.addEventListener("mousemove", (e)=>{

  let ojos = document.querySelectorAll(".ojo");

  ojos.forEach(ojo => {

    let rect = ojo.getBoundingClientRect();

    let x = rect.left + rect.width/2;
    let y = rect.top + rect.height/2;

    let dx = e.clientX - x;
    let dy = e.clientY - y;

    let angulo = Math.atan2(dy, dx);

    let distancia = 5;

    let movX = Math.cos(angulo) * distancia;
    let movY = Math.sin(angulo) * distancia;

    ojo.style.transform = `translate(${movX}px, ${movY}px)`;
  });

});

</script>

</body>
</html>
